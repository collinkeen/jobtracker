name: Daily Job Fetch

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Fetch and score jobs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && node fetch-jobs.js
      - name: Commit results
        run: |
          git config --global user.name "Job Scout Bot"
          git config --global user.email "bot@job-scout"
          git add public/jobs.json
          git diff --staged --quiet || git commit -m "Daily job fetch — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
